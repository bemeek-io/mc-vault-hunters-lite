name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build jar and create release
    runs-on: ubuntu-latest
    concurrency:
      group: release-vhlite
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so tags are available for versioning

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS=. read -r major minor patch <<< "${latest#v}"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-<none>} -> next version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Build plugin jar
        run: ./gradlew build -PpluginVersion=${{ steps.version.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: VaultHuntersLite ${{ steps.version.outputs.version }}
          files: build/libs/VaultHuntersLite-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
